name: Evaluation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Evaluate
        run: npm run eval
      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: reports/eval/
